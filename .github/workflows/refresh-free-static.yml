name: Free Static Refresh

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pronofoot-free-static-refresh
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Guard free-only mode
        run: python -m collector.sources.free_sources --audit

      - name: Refresh static app data
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python -m collector.refresh

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p _site/collector
          cp index.html scouting.html _site/
          cp -R assets _site/assets
          cp -R collector/data _site/collector/data
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
