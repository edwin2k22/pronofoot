name: Free Static Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: pronofoot-free-static-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Guard free-only mode
        run: python -m collector.sources.free_sources --audit

      - name: Refresh static app data
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python -m collector.refresh

      - name: Commit refreshed static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u index.html scouting.html collector/data collector/cache
          git add -f collector/data/projected_lineups.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No refreshed data changes to commit."
          else
            git commit -m "chore(data): refresh free static app [skip ci]"
            git push
          fi
