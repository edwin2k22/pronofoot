name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Le projet utilise des annotations float | None (Python >= 3.10)
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8 — erreurs réelles F-codes uniquement)
        run: flake8 collector/ tests/

      - name: Test (pytest)
        run: pytest tests/ --tb=short

      - name: Free-source audit
        run: python -m collector.sources.free_sources --audit
